# styles/GenAI/Fluff.yml
extends: existence
message: "GenAI Marker Detected: '%s'. Strip all AI filler language and write directly to the user."
level: error
ignorecase: true
tokens:
  - "in conclusion"
  - "delve"
  - "transformative"
  - "testament to"
  - "multifaceted"
  - "it is important to note"
  - "seamlessly"