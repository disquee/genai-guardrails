# .github/workflows/genai-guardrail.yml
name: GenAI Content Governance

# Trigger the action when a Pull Request is opened or updated
on:
  pull_request:
    paths:
      - '**.md'

jobs:
  lint-content:
    name: Vale Content Linter
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install and run the Vale linter
      - name: Enforce Docs-as-Code & GenAI Guardrails
        uses: errata-ai/vale-action@reviewdog
        with:
          # Only lint the files that were modified in this PR to save compute time
          filter_mode: added_modified
          # Use the repository's .vale.ini file
          vale_flags: "--config=.vale.ini"
        env:
          # Required for Reviewdog to post comments directly on the PR
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}